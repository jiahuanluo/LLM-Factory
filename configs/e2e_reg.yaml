# E2E 场景 5: 回归（float label）
model_name_or_path: bert-base-uncased
train_file: data/e2e/reg_train.csv
validation_files: data/e2e/reg_val.csv
text_column_names: sentence
output_dir: output/e2e_reg
do_train: true
do_eval: true
do_predict: false
do_regression: true
learning_rate: 2e-5
num_train_epochs: 1
per_device_train_batch_size: 8
per_device_eval_batch_size: 16
max_seq_length: 64
metric_name: mse
eval_strategy: epoch
save_strategy: "no"
load_best_model_at_end: false
fp16: false
report_to: none
ignore_mismatched_sizes: true
trust_remote_code: true
seed: 42
