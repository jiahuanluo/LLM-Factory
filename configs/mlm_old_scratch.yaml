# =============================================================================
# 用途: GTE 旧架构从零开始做掩码语言模型（MLM）预训练（与新架构对比预训练质量）
# 用法: python run_mlm.py configs/mlm_old_scratch.yaml
#   torchrun --nproc_per_node 8 run_mlm.py configs/mlm_old_scratch.yaml
# 必改字段: config_name, tokenizer_name, train_file, output_dir
# 可选项: model_name_or_path 保持 null；其余按需调整
# =============================================================================

# [必改] 从指定 config 随机初始化模型
model_name_or_path: null
config_name: models/gte-old-mlm              # 旧架构模型 config 目录
tokenizer_name: models/gte-large-en-v1.5

# [必改] 训练/验证数据
train_file: data/imdb_mlm/train.csv
validation_file: data/imdb_mlm/val.csv

# [必改] 输出目录
output_dir: output/mlm_old_scratch

# [常用] MLM 数据处理参数
max_seq_length: 256
mlm_probability: 0.15                        # BERT 标准掩码概率
line_by_line: true                           # 逐行 tokenize
pad_to_max_length: true

# [常用] 训练超参
num_train_epochs: 1
per_device_train_batch_size: 8
per_device_eval_batch_size: 16
learning_rate: 1e-4
warmup_ratio: 0.1

# [常用] 训练/评估开关
do_train: true
do_eval: false
save_strategy: epoch
logging_steps: 100
report_to: none

# [可选] 性能与稳定性
trust_remote_code: true
fp16: true
gradient_checkpointing: true
