# =============================================================================
# 掩码语言模型继续预训练配置
# 用法: python run_mlm.py configs/example_mlm.yaml
# 多卡: torchrun --nproc_per_node 8 run_mlm.py configs/example_mlm.yaml
# 覆盖: python run_mlm.py configs/example_mlm.yaml --learning_rate 1e-4
# =============================================================================

# -----------------------------------------------------------------------------
# 模型
# -----------------------------------------------------------------------------
model_name_or_path: bert-base-uncased
model_type: null                   # 从零训练时指定（如 bert, roberta, albert）
config_name: null
tokenizer_name: null
cache_dir: null
use_fast_tokenizer: true
model_revision: main
token: null
trust_remote_code: false
config_overrides: null             # 从零训练时覆盖配置（如 "n_embd=256,n_head=8"）
dtype: null                        # null, auto, bfloat16, float16, float32

# -----------------------------------------------------------------------------
# 任务
# -----------------------------------------------------------------------------
do_train: true
do_eval: true

# -----------------------------------------------------------------------------
# 数据源（二选一）
# 方式一: HuggingFace Hub
# -----------------------------------------------------------------------------
dataset_name: null
dataset_config_name: null

# 方式二: 本地文件
# -----------------------------------------------------------------------------
train_file: null                   # 如 data/train.txt
validation_file: null

# -----------------------------------------------------------------------------
# 训练超参（经常调整）
# -----------------------------------------------------------------------------
learning_rate: 5e-5
num_train_epochs: 10
per_device_train_batch_size: 16
per_device_eval_batch_size: 32
gradient_accumulation_steps: 1
max_seq_length: 512
warmup_ratio: 0.0
warmup_steps: 0
weight_decay: 0.0
max_grad_norm: 1.0

# -----------------------------------------------------------------------------
# MLM 配置
# -----------------------------------------------------------------------------
mlm_probability: 0.15              # 掩码概率（15% = BERT 原始设置）
line_by_line: false                # true=逐行 tokenize, false=拼接后分块

# -----------------------------------------------------------------------------
# 精度
# -----------------------------------------------------------------------------
fp16: false
bf16: false

# -----------------------------------------------------------------------------
# 评估和保存策略
# -----------------------------------------------------------------------------
eval_strategy: epoch
eval_steps: null
save_strategy: epoch
save_steps: null
save_total_limit: null

# -----------------------------------------------------------------------------
# 日志
# -----------------------------------------------------------------------------
output_dir: output/my_mlm
logging_steps: 50
logging_dir: null
logging_strategy: steps
log_level: passive
report_to: tensorboard

# -----------------------------------------------------------------------------
# 数据处理
# -----------------------------------------------------------------------------
pad_to_max_length: false
preprocessing_num_workers: null
overwrite_cache: false
validation_split_percentage: 5     # 无验证集时从训练集切分的比例

# -----------------------------------------------------------------------------
# 数据采样（调试用）
# -----------------------------------------------------------------------------
max_train_samples: null
max_eval_samples: null

# -----------------------------------------------------------------------------
# Checkpoint 恢复
# -----------------------------------------------------------------------------
resume_from_checkpoint: null

# -----------------------------------------------------------------------------
# 数据加载
# -----------------------------------------------------------------------------
dataloader_num_workers: 0
dataloader_pin_memory: true

# -----------------------------------------------------------------------------
# 优化器
# -----------------------------------------------------------------------------
optim: adamw_torch
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1e-8
lr_scheduler_type: linear

# -----------------------------------------------------------------------------
# 分布式训练
# -----------------------------------------------------------------------------
deepspeed: null
local_rank: -1

# -----------------------------------------------------------------------------
# 其他
# -----------------------------------------------------------------------------
seed: 42
streaming: false
push_to_hub: false
