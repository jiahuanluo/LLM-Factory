# 二分类 AUC 评估示例
# 用法: python run_classification.py configs/sft_cls_auc.yaml
# 多卡: torchrun --nproc_per_node 8 run_classification.py configs/sft_cls_auc.yaml

model_name_or_path: bert-base-uncased
train_file: data/train.csv
validation_files: data/val.csv
text_column_names: sentence
metric_name: auc
do_regression: false

# 训练参数
learning_rate: 2e-5
num_train_epochs: 3
per_device_train_batch_size: 32
per_device_eval_batch_size: 64
max_seq_length: 128
eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: eval_auc
greater_is_better: true
save_total_limit: 3
output_dir: output/cls_auc
report_to: tensorboard
logging_steps: 10
