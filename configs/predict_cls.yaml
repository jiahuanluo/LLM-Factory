# 分类预测配置
# 用法: python run_classification.py configs/predict_cls.yaml
# 多测试集: test_file: data/test_a.csv,data/test_b.csv

# 必填（train_file 和 validation_files 用于推断文件格式，不会实际训练）
model_name_or_path: output/cls/checkpoint-best
train_file: data/test.csv
validation_files: data/test.csv
test_file: data/test.csv
text_column_names: sentence
output_dir: output/cls_predict

# 任务
do_predict: true

# 预测
per_device_eval_batch_size: 64
max_seq_length: 128
cache_dir: ~/workspace/cache  # 留空或 null 则用 HuggingFace 默认路径（~/.cache/huggingface/）
trust_remote_code: true
