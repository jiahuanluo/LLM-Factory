# IMDB MLM scratch 预训练 - PHASE A (gte-new + Phase A: QK-Norm + Partial RoPE + SWA + tie_emb)
# 与 pt_mlm_imdb_baseline.yaml 完全相同，仅 config_name/tokenizer_name 不同

model_name_or_path: null
config_name: models/gte-new
tokenizer_name: models/gte-new
trust_remote_code: true

train_file: data/imdb/pretrain_corpus.txt
validation_file: data/imdb/val_corpus.txt

line_by_line: false
max_seq_length: 256
mlm_probability: 0.15
pad_to_max_length: true

do_train: true
do_eval: true

output_dir: tmp/imdb_mlm_phaseA_out
save_strategy: epoch
eval_strategy: epoch

num_train_epochs: 20
per_device_train_batch_size: 16
per_device_eval_batch_size: 32
gradient_accumulation_steps: 1
learning_rate: 1e-4
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0

fp16: true
bf16: false

logging_steps: 50
logging_first_step: true
report_to: []
seed: 42
