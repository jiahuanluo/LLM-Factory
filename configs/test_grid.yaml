# =============================================================================
# 用途: 网格搜索冒烟测试 —— 极小样本（100 训练 / 50 评估）快速验证超参组合流程
# 用法: python run_classification.py configs/test_grid.yaml; 配合 scripts/grid_search.sh
#   bash scripts/grid_search.sh   # 批量遍历超参
# 必改字段: model_name_or_path, train_file, validation_files
# 可选项: 样本数与 epoch 故意设小以加速冒烟测试
# =============================================================================

# [必改] 模型路径（占位符，使用前替换为真实路径）
model_name_or_path: /path/to/bert-base-uncased

# [必改] 训练/验证数据
train_file: data/train.csv
validation_files: data/val.csv
text_column_names: sentence

# [常用] 评估指标
metric_name: accuracy

# [常用] 训练/评估开关
do_train: true
do_eval: true

# [冒烟测试专用] 极小训练量，目的只是验证流程而非精度
num_train_epochs: 1
max_train_samples: 100                       # 只取前 100 条训练样本
max_eval_samples: 50                         # 只取前 50 条评估样本

# [必改] 输出目录
output_dir: output/test_grid

# [可选] 日志与缓存
report_to: tensorboard                       # 上报到 TensorBoard
cache_dir: ~/workspace/cache                 # 模型/数据缓存目录（留空则用 HF 默认路径）
trust_remote_code: true
