# =============================================================================
# 用途: GTE 新架构 MLM 预训练后做 IMDB 情感分类微调（验证预训练效果）
# 用法: python run_classification.py configs/finetune_new_pretrained.yaml
#   torchrun --nproc_per_node 8 run_classification.py configs/finetune_new_pretrained.yaml
# 必改字段: model_name_or_path, train_file, validation_files, output_dir
# 可选项: 其余字段均有合理默认值，按需调整
# =============================================================================

# [必改] 模型路径 —— 指向本地 MLM 预训练产物目录
model_name_or_path: models/gte-new-pretrained

# [必改] 训练/验证数据（CSV 或 JSON，列名需与 text_column_names 对齐）
train_file: data/imdb/train.csv
validation_files: data/imdb/val.csv
text_column_names: sentence                 # 文本所在列名

# [必改] 输出目录 —— checkpoint 与日志写到这里
output_dir: output/finetune_new_pretrained

# [常用] 训练超参
learning_rate: 2e-5                          # 微调学习率，2e-5 适合 BERT-scale
num_train_epochs: 1                          # 测试场景只跑 1 个 epoch
per_device_train_batch_size: 4               # 单卡训练 batch size
per_device_eval_batch_size: 8                # 单卡评估 batch size
max_seq_length: 256                          # 序列截断长度
metric_name: accuracy                        # 评估指标：accuracy / auc / ks / f1 / mse

# [常用] 训练/评估开关
do_train: true                               # 是否执行训练
do_eval: true                                # 是否在验证集上评估

# [可选] 评估/保存/日志策略（测试场景下用 steps，便于中途观察）
eval_strategy: steps                         # 评估策略：steps / epoch
eval_steps: 500                              # 每 500 步评估一次
save_strategy: "no"                          # 测试时关闭 checkpoint 落盘
logging_steps: 100                           # 每 100 步打印一次 loss
report_to: none                              # 不上报到 tensorboard/wandb

# [可选] 模型加载与性能
trust_remote_code: true                      # 信任 remote code（GTE 自定义模型需要）
fp16: false                                  # 关闭 FP16（与 gradient_checkpointing 配合时更稳）
gradient_checkpointing: false                # 关闭梯度检查点（省显存但降速）
