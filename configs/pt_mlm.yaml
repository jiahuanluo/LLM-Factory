# MLM 继续预训练示例
# 用法: python run_mlm.py configs/pt_mlm.yaml
# 多卡: torchrun --nproc_per_node 8 run_mlm.py configs/pt_mlm.yaml

model_name_or_path: bert-base-uncased
train_file: data/train.txt
validation_file: data/val.txt
line_by_line: true
max_seq_length: 512

# 训练参数
learning_rate: 5e-5
num_train_epochs: 10
per_device_train_batch_size: 16
per_device_eval_batch_size: 32
mlm_probability: 0.15
eval_strategy: epoch
save_strategy: epoch
output_dir: output/mlm
report_to: tensorboard
logging_steps: 50
