# MLM 继续预训练示例
# 用法: python run_mlm.py configs/pt_mlm.yaml
# 多卡: torchrun --nproc_per_node 8 run_mlm.py configs/pt_mlm.yaml

# 模型
model_name_or_path: bert-base-uncased

# 数据
train_file: data/train.txt
validation_file: data/val.txt

# 训练超参
learning_rate: 5e-5
num_train_epochs: 10
per_device_train_batch_size: 16
per_device_eval_batch_size: 32
max_seq_length: 512

# MLM 配置
mlm_probability: 0.15
line_by_line: true

# 评估和保存
eval_strategy: epoch
save_strategy: epoch

# 日志
output_dir: output/mlm
report_to: tensorboard
logging_steps: 50
