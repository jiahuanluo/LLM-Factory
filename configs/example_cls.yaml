# =============================================================================
# 文本分类训练配置
# 用法: python run_classification.py configs/example_cls.yaml
# 多卡: torchrun --nproc_per_node 8 run_classification.py configs/example_cls.yaml
# 覆盖: python run_classification.py configs/example_cls.yaml --learning_rate 1e-4
# =============================================================================

# -----------------------------------------------------------------------------
# 模型
# -----------------------------------------------------------------------------
model_name_or_path: bert-base-uncased
config_name: null
tokenizer_name: null
cache_dir: null
use_fast_tokenizer: true
model_revision: main
token: null
trust_remote_code: false
ignore_mismatched_sizes: false

# -----------------------------------------------------------------------------
# 任务
# -----------------------------------------------------------------------------
do_train: true
do_eval: true
do_predict: false
do_regression: false               # false=分类, true=回归

# -----------------------------------------------------------------------------
# 数据源（二选一）
# 方式一: HuggingFace Hub
# -----------------------------------------------------------------------------
dataset_name: null                 # 如 imdb, glue
dataset_config_name: null

# 方式二: 本地文件
# -----------------------------------------------------------------------------
train_file: null                   # 如 data/train.csv
validation_files: null             # 单文件 data/val.csv 或多文件 val1.csv,val2.csv
test_file: null

# -----------------------------------------------------------------------------
# 数据列
# -----------------------------------------------------------------------------
text_column_names: null            # 文本列名，多列用逗号分隔（如 title,content）
text_column_delimiter: " "         # 多列拼接分隔符
label_column_name: null            # 标签列名（默认 label）

# -----------------------------------------------------------------------------
# 数据集划分（仅 Hub 数据集）
# -----------------------------------------------------------------------------
train_split_name: null
validation_split_name: null
test_split_name: null

# -----------------------------------------------------------------------------
# 数据清理
# -----------------------------------------------------------------------------
remove_splits: null
remove_columns: null

# -----------------------------------------------------------------------------
# 评估指标
# -----------------------------------------------------------------------------
metric_name: null                  # accuracy, auc, ks, f1, mse（默认按任务类型自动选择）

# -----------------------------------------------------------------------------
# 训练超参（经常调整）
# -----------------------------------------------------------------------------
learning_rate: 2e-5
num_train_epochs: 3
per_device_train_batch_size: 32
per_device_eval_batch_size: 64
gradient_accumulation_steps: 1
max_seq_length: 128
warmup_ratio: 0.0
warmup_steps: 0
weight_decay: 0.0
max_grad_norm: 1.0

# -----------------------------------------------------------------------------
# 精度
# -----------------------------------------------------------------------------
fp16: false
bf16: false

# -----------------------------------------------------------------------------
# Best Model
# -----------------------------------------------------------------------------
load_best_model_at_end: false
metric_for_best_model: null        # 如 eval_auc, eval_accuracy
greater_is_better: true
save_total_limit: null

# -----------------------------------------------------------------------------
# 评估和保存策略
# -----------------------------------------------------------------------------
eval_strategy: epoch               # steps, epoch
eval_steps: null
save_strategy: epoch               # steps, epoch
save_steps: null

# -----------------------------------------------------------------------------
# 日志
# -----------------------------------------------------------------------------
output_dir: output/my_model
logging_steps: 50
logging_dir: null
logging_strategy: steps            # steps, epoch
log_level: passive
report_to: tensorboard             # tensorboard, wandb, none

# -----------------------------------------------------------------------------
# 数据处理
# -----------------------------------------------------------------------------
pad_to_max_length: true
preprocessing_num_workers: null
overwrite_cache: false
shuffle_train_dataset: false
shuffle_seed: 42

# -----------------------------------------------------------------------------
# 数据采样（调试用）
# -----------------------------------------------------------------------------
max_train_samples: null
max_eval_samples: null
max_predict_samples: null

# -----------------------------------------------------------------------------
# Checkpoint 恢复
# -----------------------------------------------------------------------------
resume_from_checkpoint: null       # 不指定时自动从 output_dir 最新 checkpoint 恢复

# -----------------------------------------------------------------------------
# 数据加载
# -----------------------------------------------------------------------------
dataloader_num_workers: 0
dataloader_pin_memory: true
dataloader_prefetch_factor: null

# -----------------------------------------------------------------------------
# 优化器
# -----------------------------------------------------------------------------
optim: adamw_torch
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1e-8
lr_scheduler_type: linear          # linear, cosine, cosine_with_restarts, polynomial, constant, constant_with_warmup

# -----------------------------------------------------------------------------
# 分布式训练（通常不需要手动设置，torchrun 自动处理）
# -----------------------------------------------------------------------------
deepspeed: null                    # DeepSpeed 配置文件路径，如 configs/ds_z2.json
local_rank: -1

# -----------------------------------------------------------------------------
# 其他
# -----------------------------------------------------------------------------
seed: 42
label_smoothing_factor: 0.0
torch_compile: false
push_to_hub: false
