# =============================================================================
# 文本分类训练配置（完整示例）
# 用法: python run_classification.py configs/example_cls.yaml
# 多卡: torchrun --nproc_per_node 8 run_classification.py configs/example_cls.yaml
# 覆盖: python run_classification.py configs/example_cls.yaml --learning_rate 1e-4
# =============================================================================

# -----------------------------------------------------------------------------
# 模型配置
# -----------------------------------------------------------------------------
model_name_or_path: bert-base-uncased  # 预训练模型路径或 HuggingFace Hub 模型 ID
# config_name: null                    # 配置文件路径（默认与 model_name_or_path 相同）
# tokenizer_name: null                 # tokenizer 路径（默认与 model_name_or_path 相同）
# cache_dir: null                      # 模型缓存目录（默认 ~/.cache/huggingface/hub）
# use_fast_tokenizer: true             # 是否使用 fast tokenizer
# model_revision: main                 # 模型版本（分支名、tag 或 commit id）
# token: null                          # HuggingFace Hub 访问令牌（私有模型时需要）
# trust_remote_code: false             # 是否信任远程代码（谨慎使用）
# ignore_mismatched_sizes: false       # 加载模型时忽略维度不匹配（如修改了分类头）

# -----------------------------------------------------------------------------
# 任务配置
# -----------------------------------------------------------------------------
do_regression: false                   # 是否为回归任务（默认 false，自动分类）
                                       # 二分类/多分类: false
                                       # 回归（如评分预测）: true
                                       # 注意: label 为 float 时不会自动切换为回归

# -----------------------------------------------------------------------------
# 数据配置
# 方式一: 从 HuggingFace Hub 加载
# -----------------------------------------------------------------------------
dataset_name: imdb                     # HuggingFace 数据集名称
# dataset_config_name: null            # 数据集配置名（如 "zh"、"en"）

# -----------------------------------------------------------------------------
# 数据配置
# 方式二: 从本地文件加载（与 dataset_name 二选一）
# -----------------------------------------------------------------------------
# train_file: data/train.csv           # 训练集文件（CSV 或 JSON）
# validation_files: data/val.csv       # 验证集文件，多个用逗号分隔
#                                      # 单文件: "data/val.csv"
#                                      # 多文件: "data/val1.csv,data/val2.csv,data/val3.csv"
#                                      # 多文件时 Trainer 自动分别评估，指标带 eval_validation_N_ 前缀
# test_file: data/test.csv             # 测试集文件（do_predict 时使用）

# -----------------------------------------------------------------------------
# 数据列配置
# -----------------------------------------------------------------------------
text_column_names: text                # 文本列名，多列用逗号分隔（如 "title,content"）
# text_column_delimiter: " "           # 多文本列拼接时的分隔符
# label_column_name: label             # 标签列名（默认 "label"）

# -----------------------------------------------------------------------------
# 数据集划分配置（仅 Hub 数据集时有效）
# -----------------------------------------------------------------------------
# train_split_name: train              # 训练集 split 名称
# validation_split_name: validation    # 验证集 split 名称
# test_split_name: test                # 测试集 split 名称

# -----------------------------------------------------------------------------
# 数据清理配置
# -----------------------------------------------------------------------------
# remove_splits: null                  # 要移除的 split（逗号分隔）
# remove_columns: null                 # 要移除的列（逗号分隔）

# -----------------------------------------------------------------------------
# 评估指标配置
# -----------------------------------------------------------------------------
metric_name: auc                       # 评估指标，可选值:
                                       #   accuracy  - 准确率（默认，多分类）
                                       #   auc       - AUC（二分类/多分类）
                                       #   ks        - KS 统计量（仅二分类）
                                       #   f1        - F1 micro（多标签分类）
                                       #   mse       - 均方误差（回归任务）

# -----------------------------------------------------------------------------
# 数据处理配置
# -----------------------------------------------------------------------------
max_seq_length: 128                    # 最大序列长度（tokenize 后），超长截断，短的补齐
# pad_to_max_length: true              # 是否统一填充到 max_seq_length
                                       # true:  固定长度，效率高，适合长文本
                                       # false: 动态 padding，按 batch 内最长序列填充，省内存
# preprocessing_num_workers: null      # 数据预处理进程数（默认单进程）
# overwrite_cache: false               # 是否覆盖缓存的预处理数据

# -----------------------------------------------------------------------------
# 数据采样配置（调试时使用）
# -----------------------------------------------------------------------------
# max_train_samples: null              # 最大训练样本数（null 表示使用全部）
# max_eval_samples: null               # 最大验证样本数
# max_predict_samples: null            # 最大测试样本数
# shuffle_train_dataset: false         # 是否打乱训练集
# shuffle_seed: 42                     # 打乱种子

# -----------------------------------------------------------------------------
# 训练控制
# -----------------------------------------------------------------------------
do_train: true                         # 是否训练
do_eval: true                          # 是否评估
# do_predict: false                    # 是否预测（输出预测结果到 output_dir/predict_results.txt）

# -----------------------------------------------------------------------------
# 优化器配置
# -----------------------------------------------------------------------------
learning_rate: 2e-5                    # 学习率（推荐: BERT 2e-5, RoBERTa 1e-5, 大模型 1e-4~5e-5）
# weight_decay: 0.0                    # 权重衰减（L2 正则化）
# adam_beta1: 0.9                      # AdamW beta1
# adam_beta2: 0.999                    # AdamW beta2
# adam_epsilon: 1e-8                   # AdamW epsilon
# max_grad_norm: 1.0                   # 梯度裁剪阈值

# -----------------------------------------------------------------------------
# 学习率调度配置
# -----------------------------------------------------------------------------
# lr_scheduler_type: linear            # 学习率调度器类型: linear, cosine, cosine_with_restarts, polynomial, constant, constant_with_warmup
# warmup_ratio: 0.0                    # warmup 步数占总步数的比例
# warmup_steps: 0                      # warmup 步数（优先于 warmup_ratio）

# -----------------------------------------------------------------------------
# 训练轮次和批次配置
# -----------------------------------------------------------------------------
num_train_epochs: 3                    # 训练轮次
per_device_train_batch_size: 32        # 每 GPU 训练 batch size
per_device_eval_batch_size: 64         # 每 GPU 评估 batch size（通常可以比训练 batch 大）
# gradient_accumulation_steps: 1       # 梯度累积步数（等效增大 batch size）
                                       # 实际 batch = per_device_train_batch_size * n_gpu * gradient_accumulation_steps

# -----------------------------------------------------------------------------
# 精度配置
# -----------------------------------------------------------------------------
# fp16: false                          # 是否使用 FP16 混合精度（需要 GPU 支持）
# bf16: false                          # 是否使用 BF16 混合精度（A100/H100 推荐）

# -----------------------------------------------------------------------------
# 保存和日志配置
# -----------------------------------------------------------------------------
output_dir: output/example_cls         # 输出目录（checkpoint、日志、模型）
# save_strategy: steps                 # 保存策略: "steps" 或 "epoch"
# save_steps: 500                      # 每 N 步保存一次（save_strategy=steps 时生效）
# save_total_limit: null               # 最多保留 checkpoint 数量（null 表示全部保留）
# logging_dir: null                    # TensorBoard 日志目录（默认 output_dir/runs）
# logging_strategy: steps              # 日志策略: "steps" 或 "epoch"
logging_steps: 50                      # 每 N 步记录一次 loss
# log_level: passive                   # 日志级别: debug, info, warning, error, passive
# log_level_replica: warning           # 副本日志级别

# -----------------------------------------------------------------------------
# 评估配置
# -----------------------------------------------------------------------------
eval_strategy: epoch                   # 评估策略: "steps" 或 "epoch"
# eval_steps: null                     # 每 N 步评估一次（eval_strategy=steps 时生效）
# eval_delay: 0                        # 延迟 N 步后开始评估

# -----------------------------------------------------------------------------
# Best Model 配置
# -----------------------------------------------------------------------------
load_best_model_at_end: true           # 训练结束后加载最优 checkpoint
metric_for_best_model: eval_auc        # 判断最优模型的指标（必须与 metric_name 对应）
                                       # 格式: eval_{metric_name}
                                       # 多验证集: eval_validation_0_{metric_name}
greater_is_better: true                # 指标越大越好（accuracy/auc: true, loss/mse: false）

# -----------------------------------------------------------------------------
# 报告配置
# -----------------------------------------------------------------------------
report_to: tensorboard                 # 日志报告工具: tensorboard, wandb, none, 逗号分隔多个

# -----------------------------------------------------------------------------
# Checkpoint 恢复配置
# -----------------------------------------------------------------------------
# resume_from_checkpoint: null         # 从指定 checkpoint 恢复训练
                                       # 不指定时自动从 output_dir 最新 checkpoint 恢复

# -----------------------------------------------------------------------------
# 数据加载配置
# -----------------------------------------------------------------------------
# dataloader_num_workers: 0            # 数据加载进程数
# dataloader_pin_memory: true          # 是否 pin memory（加速 GPU 数据传输）
# dataloader_prefetch_factor: null     # 预取因子

# -----------------------------------------------------------------------------
# 分布式训练配置（通常不需要手动设置，torchrun 自动处理）
# 使用方式: torchrun --nproc_per_node 8 run_classification.py configs/example_cls.yaml
# -----------------------------------------------------------------------------
# deepspeed: null                      # DeepSpeed 配置文件路径（如 configs/ds_z2.json）
#                                      # 多卡 DeepSpeed: torchrun --nproc_per_node 8 run_classification.py config.yaml --deepspeed configs/ds_z2.json
# local_rank: -1                       # 本地进程 rank（torchrun 自动设置）

# -----------------------------------------------------------------------------
# 多节点训练配置
# 使用方式: torchrun --nnodes 2 --nproc_per_node 8 --master_addr 10.0.0.1 run_classification.py config.yaml
# -----------------------------------------------------------------------------
# nproc_per_node: null                 # 每节点进程数（默认为 GPU 数量）
# nnodes: 1                            # 节点数量
# node_rank: 0                         # 当前节点 rank
# master_addr: 127.0.0.1              # 主节点地址
# master_port: null                    # 主节点端口（自动选择可用端口）

# -----------------------------------------------------------------------------
# 其他配置
# -----------------------------------------------------------------------------
# seed: 42                             # 随机种子
# full_determinism: false              # 是否启用完全确定性模式（牺牲速度换取可复现性）
# torch_compile: false                 # 是否使用 torch.compile（PyTorch 2.0+）
# optim: adamw_torch                   # 优化器类型
# label_smoothing_factor: 0.0          # 标签平滑系数
# push_to_hub: false                   # 是否推送模型到 HuggingFace Hub
