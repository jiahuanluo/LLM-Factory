train_samples: data/pbc/processed/samples_train.pkl
val_samples:   data/pbc/processed/samples_val.pkl
cat_vocab:     data/pbc/processed/cat_vocab.json
init_from_pretrain: output/pbc_pretrained/encoder_state.pt

output_dir: output/pbc_finetuned

epochs: 5
batch_size: 8
lr: 5.0e-5
weight_decay: 0.01
pos_weight: 4.0

d: 128
n_heads: 4
n_layers: 2
dropout: 0.1

# text 分支（联合微调）
use_text_branch: true
text_encoder_name: models/gte-new
text_hidden_size: 1024
text_vocab_size: 30528
text_max_len: 512

num_workers: 0
log_every: 20
eval_per_epoch_steps: 100
seed: 42
