# 文本分类微调配置
# 用法: python run_classification.py configs/sft_cls.yaml
# 多卡: torchrun --nproc_per_node 8 run_classification.py configs/sft_cls.yaml
# CLI 覆盖: python run_classification.py configs/sft_cls.yaml --learning_rate 1e-4

# 必填
model_name_or_path: bert-base-uncased
train_file: data/train.csv
validation_files: data/val.csv
text_column_names: sentence
output_dir: output/cls

# 常用
learning_rate: 2e-5
num_train_epochs: 3
per_device_train_batch_size: 32
per_device_eval_batch_size: 64
max_seq_length: 128
metric_name: accuracy

# 任务
do_train: true
do_eval: true

# 评估和保存
eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: eval_accuracy
save_total_limit: 3

# 日志
logging_steps: 10
report_to: tensorboard
cache_dir: ~/workspace/cache  # 留空或 null 则用 HuggingFace 默认路径（~/.cache/huggingface/）
trust_remote_code: true
