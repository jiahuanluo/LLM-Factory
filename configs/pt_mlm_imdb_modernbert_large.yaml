# IMDB MLM 从头预训练 - ModernBERT-large (本地 fork)
# Mini 验证版：3 epoch，max_seq 512，V100 16GB 上 batch 4 + grad_accum 4 + gradient checkpointing

model_name_or_path: null
config_name: models/modernbert
tokenizer_name: models/modernbert
trust_remote_code: true

train_file: data/imdb/pretrain_corpus.txt
validation_file: data/imdb/val_corpus.txt

line_by_line: false
max_seq_length: 512
mlm_probability: 0.15
pad_to_max_length: true

do_train: true
do_eval: true

output_dir: tmp/imdb_mlm_modernbert_large_out
save_strategy: epoch
eval_strategy: epoch

num_train_epochs: 3
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
gradient_checkpointing: true
learning_rate: 1e-4
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0

fp16: true
bf16: false

logging_steps: 50
logging_first_step: true
report_to: []
seed: 42
