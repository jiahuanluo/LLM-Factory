# =============================================================================
# 用途: 最小冒烟测试 —— 验证多验证集 + AUC 指标流程是否正确，跑 1 个 epoch
#       确认 Trainer 实际暴露的 metric key 名（如 eval_validation_0_auc）
# 用法: python run_classification.py configs/test_multi_val_auc.yaml
# 必改字段: model_name_or_path, train_file, validation_files, output_dir
# 可选项: max_seq_length 故意设小（64）以加速冒烟测试
# =============================================================================

# [必改] 模型路径（用最小的 bert-base-uncased 做流程验证）
model_name_or_path: bert-base-uncased

# [必改] 训练/验证数据 —— validation_files 用逗号分隔两个文件触发多验证集逻辑
train_file: data/train.csv
validation_files: data/val_a.csv,data/val_b.csv   # 多验证集：会被加载为 validation_0 / validation_1
text_column_names: sentence

# [必改] 输出目录
output_dir: output/test_multi_val_auc

# [常用] 训练超参（冒烟测试，batch 较大、seq 较短）
learning_rate: 2e-5
num_train_epochs: 1
per_device_train_batch_size: 16
per_device_eval_batch_size: 32
max_seq_length: 64                           # 故意设小，加速流程验证
metric_name: auc                             # 二分类 AUC（会同时计算 ks）

# [常用] 训练/评估开关
do_train: true
do_eval: true

# [可选] 评估/保存策略 —— 每个 epoch 评估并保存最优模型
eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true                 # 训练结束加载最优 checkpoint
metric_for_best_model: eval_validation_0_auc # 以第一个验证集的 AUC 选最优
greater_is_better: true                      # AUC 越大越好

# [可选] 日志
report_to: none
trust_remote_code: true
