# 最小测试：多验证集 + AUC，跑 1 epoch 看实际 metric key 和校验行为
model_name_or_path: bert-base-uncased
train_file: data/train.csv
validation_files: data/val_a.csv,data/val_b.csv
text_column_names: sentence
output_dir: output/test_multi_val_auc

learning_rate: 2e-5
num_train_epochs: 1
per_device_train_batch_size: 16
per_device_eval_batch_size: 32
max_seq_length: 64
metric_name: auc

do_train: true
do_eval: true

eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: eval_validation_0_auc
greater_is_better: true

report_to: none
trust_remote_code: true
