# =============================================================================
# 用途: GTE 新架构分类测试 —— 加载 GTE-large 预训练权重做 IMDB 情感分类（横向对比用）
# 用法: python run_classification.py configs/test_gte_cls.yaml
#   torchrun --nproc_per_node 8 run_classification.py configs/test_gte_cls.yaml
# 必改字段: model_name_or_path, train_file, validation_files, output_dir
# 可选项: 其余字段为快速冒烟测试的默认值
# =============================================================================

# [必改] 直接加载已发布的 GTE 模型作为分类 backbone
model_name_or_path: models/gte-large-en-v1.5

# [必改] 训练/验证数据
train_file: data/imdb/train.csv
validation_files: data/imdb/val.csv
text_column_names: sentence

# [必改] 输出目录
output_dir: output/gte_cls_test

# [常用] 训练超参（冒烟测试，1 epoch）
learning_rate: 2e-5
num_train_epochs: 1
per_device_train_batch_size: 8
per_device_eval_batch_size: 16
max_seq_length: 256
metric_name: accuracy

# [常用] 训练/评估开关
do_train: true
do_eval: true

# [可选] 评估/保存/日志策略
eval_strategy: steps                         # 每 N 步评估一次
eval_steps: 500
save_strategy: steps                         # 每 N 步保存 checkpoint
save_steps: 500
logging_steps: 100
report_to: none

# [可选] 性能与稳定性
trust_remote_code: true                      # 加载 GTE 自定义代码
fp16: true                                   # FP16 混合精度
gradient_checkpointing: true                 # 梯度检查点
