# GTE 模型分类训练测试
model_name_or_path: models/gte-large-en-v1.5
train_file: data/train.csv
validation_files: data/val.csv
text_column_names: sentence
output_dir: output/gte_cls_test

learning_rate: 2e-5
num_train_epochs: 1
per_device_train_batch_size: 1
per_device_eval_batch_size: 2
fp16: true
gradient_checkpointing: true
max_seq_length: 128
metric_name: accuracy

do_train: true
do_eval: true

eval_strategy: epoch
save_strategy: epoch
logging_steps: 5
report_to: none
trust_remote_code: true
