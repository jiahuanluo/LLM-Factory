# =============================================================================
# 用途: GTE 新架构随机初始化分类测试 —— 不加载预训练权重，仅用 config 初始化（基线）
# 用法: python run_classification.py configs/test_gte_new_scratch.yaml
#   torchrun --nproc_per_node 8 run_classification.py configs/test_gte_new_scratch.yaml
# 必改字段: config_name, tokenizer_name, train_file, validation_files, output_dir
# 可选项: model_name_or_path 保持 null；其余为冒烟测试默认值
# =============================================================================

# [必改] 从指定 config 随机初始化（不加载预训练权重）
model_name_or_path: null
config_name: models/gte-new-scratch          # 新架构随机初始化 config
tokenizer_name: models/gte-large-en-v1.5

# [必改] 训练/验证数据
train_file: data/imdb/train.csv
validation_files: data/imdb/val.csv
text_column_names: sentence

# [必改] 输出目录
output_dir: output/gte_new_scratch

# [常用] 训练超参
learning_rate: 2e-5
num_train_epochs: 1
per_device_train_batch_size: 4
per_device_eval_batch_size: 8
max_seq_length: 256
metric_name: accuracy

# [常用] 训练/评估开关
do_train: true
do_eval: true

# [可选] 评估/保存/日志策略
eval_strategy: steps
eval_steps: 500
save_strategy: "no"                          # 随机初始化基线不需要保存 checkpoint
logging_steps: 100
report_to: none

# [可选] 性能与稳定性
trust_remote_code: true
fp16: true
gradient_checkpointing: true
