# =============================================================================
# 用途: GTE 新架构从零开始做掩码语言模型（MLM）预训练（不加载任何预训练权重）
# 用法: python run_mlm.py configs/mlm_new_scratch.yaml
#   torchrun --nproc_per_node 8 run_mlm.py configs/mlm_new_scratch.yaml
# 必改字段: config_name, tokenizer_name, train_file, output_dir
# 可选项: model_name_or_path 保持 null（从 config_name 初始化随机权重）；其余按需调整
# =============================================================================

# [必改] 从指定 config 随机初始化模型 —— model_name_or_path 必须为 null
model_name_or_path: null
config_name: models/gte-new-mlm              # 新架构模型 config 目录
tokenizer_name: models/gte-large-en-v1.5     # 复用 GTE tokenizer

# [必改] 训练/验证数据（MLM 不需要标签列，整行作为无监督语料）
train_file: data/imdb_mlm/train.csv
validation_file: data/imdb_mlm/val.csv       # MLM 使用单数 validation_file

# [必改] 输出目录
output_dir: output/mlm_new_scratch

# [常用] MLM 数据处理参数
max_seq_length: 256                          # 序列长度
mlm_probability: 0.15                        # 每个 token 被掩码的概率（BERT 默认 0.15）
line_by_line: true                           # 逐行 tokenize（不拼接分块）
pad_to_max_length: true                      # 固定长度 padding

# [常用] 训练超参
num_train_epochs: 1
per_device_train_batch_size: 8
per_device_eval_batch_size: 16
learning_rate: 1e-4                          # 从零训练比微调用更大学习率
warmup_ratio: 0.1                            # 前 10% 步数做 warmup

# [常用] 训练/评估开关
do_train: true
do_eval: false                               # 测试场景关闭中途评估
save_strategy: epoch                         # 每 epoch 保存一次 checkpoint
logging_steps: 100
report_to: none

# [可选] 性能与稳定性
trust_remote_code: true                      # 加载自定义 GTE 架构需要
fp16: true                                   # FP16 混合精度
gradient_checkpointing: true                 # 梯度检查点，节省显存
