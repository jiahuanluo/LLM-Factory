# IMDB 分类微调 - ModernBERT-large (从 tmp/imdb_mlm_modernbert_large_out 初始化)
# Mini 验证版：3 epoch，gradient checkpointing 开

model_name_or_path: tmp/imdb_mlm_modernbert_large_out
trust_remote_code: true

train_file: data/imdb/train.csv
validation_files: data/imdb/val.csv
text_column_names: sentence

do_train: true
do_eval: true

output_dir: tmp/imdb_cls_modernbert_large_out
save_strategy: "no"
eval_strategy: epoch

num_train_epochs: 3
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 2
gradient_checkpointing: true
learning_rate: 2e-5
weight_decay: 0.01

fp16: true
bf16: false

logging_steps: 50
report_to: []
seed: 42
