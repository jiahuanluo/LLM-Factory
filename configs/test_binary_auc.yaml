# 二分类 AUC 测试配置（使用 IMDB 数据集）
# 用法: python run_classification.py configs/test_binary_auc.yaml
# 多卡: torchrun --nproc_per_node 8 run_classification.py configs/test_binary_auc.yaml

model_name_or_path: ~/.cache/huggingface/hub/models--bert-base-uncased/snapshots/86b5e0934494bd15c9632b12f734a8a67f723594
dataset_name: imdb
text_column_names: text
metric_name: auc
do_regression: false
do_train: true
do_eval: true

# 训练参数
learning_rate: 2e-5
num_train_epochs: 2
per_device_train_batch_size: 32
per_device_eval_batch_size: 64
max_seq_length: 128
eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: eval_auc
greater_is_better: true
save_total_limit: 2
output_dir: output/test_binary_auc
report_to: tensorboard
logging_steps: 50
